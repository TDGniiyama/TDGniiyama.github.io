<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Summary — mynails. / TIP DE GEL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F5F2; font-family: 'Helvetica Neue', Arial, sans-serif; }
  button { cursor: pointer; font-family: inherit; }
  .drop-zone {
    border: 2px dashed #555; border-radius: 8px; padding: 40px 24px;
    text-align: center; cursor: pointer; transition: all 0.2s; background: #1E1E1E;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #AAA; background: #222; }
  input[type=file] { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const EXCLUDE = ['計測用チップ','装着セット','紛失補償','事前スペア','品質保証','単品での制作','ご購入者様専用','フット（親指のみ）','サンプル'];

const DESIGN_COLORS = {
  "Genesis Vein":"#7B9E87","影鉱":"#6B6B7B","sea mist":"#7EB6C2",
  "煌岩":"#A8A8B8","SMOKE PLUM":"#9E8A7A","smoky blush":"#C4A49A",
  "smoky wood":"#8B7355","NEUTRAL VEIN":"#B89A8A","apricot glow":"#D4A574",
  "MISTY STONE":"#94A4A8","mist silver":"#B4B8C4","Black Glow":"#2A2A2A",
  "Melt Vein":"#8B9E8A","milky opal":"#D4C8C0","余光":"#C4B870","寂静の煌砂":"#B8A898",
  "sandy quartz":"#C8B89A","umber bronze":"#9A7A5A","rosy veil":"#D4A4A4",
};
function getColor(d) {
  if (!d) return "#888";
  for (const [k,v] of Object.entries(DESIGN_COLORS)) if (d.includes(k)) return v;
  return "#888";
}
function shortName(d) {
  if (!d) return "";
  return d.replace("6月限定｜","").replace(/\s*[—]+[^—]*[—]+\s*/g," ").replace(/\s*-\s*.+\s*-\s*$/,"").replace("（マグネットデザイン）","").trim();
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (!lines.length) return [];
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g,"").trim());
  function getCol(cols, name) {
    const idx = headers.indexOf(name);
    if (idx < 0) return "";
    return (cols[idx] || "").replace(/^"|"$/g,"").trim();
  }
  function parseLine(line) {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') inQ = !inQ;
      else if (c === ',' && !inQ) { cols.push(cur); cur = ""; }
      else cur += c;
    }
    cols.push(cur);
    return cols;
  }

  const orders = {};
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i];
    if (!line.trim()) continue;
    const cols = parseLine(line);
    const oid = getCol(cols, "Name");
    const itemName = getCol(cols, "Lineitem name");
    const vendor = getCol(cols, "Vendor");
    const customer = getCol(cols, "Billing Name") || getCol(cols, "Shipping Name");
    const created = getCol(cols, "Created at").slice(0, 7).replace("-", "/");
    const qty = parseInt(getCol(cols, "Lineitem quantity") || "1");
    const cancelled = getCol(cols, "Cancelled at");

    if (!oid || EXCLUDE.some(kw => itemName.includes(kw)) || !itemName || cancelled) continue;

    if (!orders[oid]) orders[oid] = { id: oid, customer: "", items: [], month: created };
    if (customer && !orders[oid].customer) orders[oid].customer = customer;
    if (created && !orders[oid].month) orders[oid].month = created;

    for (let q = 0; q < qty; q++) {
      orders[oid].items.push({ design: itemName, vendor: vendor || "TIP DE GEL" });
    }
  }
  return Object.values(orders).filter(o => o.items.length > 0);
}

const BRAND_COLORS = {
  "mynails":    { accent: "#7EB6C2", bg: "#EEF6F8", label: "mynails." },
  "TIP DE GEL": { accent: "#9A7A5A", bg: "#F5F0EB", label: "TIP DE GEL" },
};
function bcOf(vendor) { return BRAND_COLORS[vendor] || BRAND_COLORS["TIP DE GEL"]; }

function App() {
  const [allOrders, setAllOrders] = React.useState([]);
  const [fileName, setFileName]   = React.useState(null);
  const [drag, setDrag]           = React.useState(false);
  const [brandFilter, setBrandFilter] = React.useState("all");
  const [monthFilter, setMonthFilter] = React.useState("all");
  const fileRef = React.useRef();

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const orders = parseCSV(e.target.result);
      setAllOrders(orders);
      setFileName(file.name);
      const months = [...new Set(orders.map(o => o.month).filter(Boolean))].sort().reverse();
      if (months.length) setMonthFilter(months[0]);
    };
    reader.readAsText(file, "utf-8");
  }

  const months = React.useMemo(() => {
    const s = new Set(allOrders.map(o => o.month).filter(Boolean));
    return [...s].sort().reverse();
  }, [allOrders]);

  const filtered = React.useMemo(() => allOrders.filter(o => {
    if (monthFilter !== "all" && o.month !== monthFilter) return false;
    return true;
  }), [allOrders, monthFilter]);

  const countMap = {};
  filtered.forEach(o => o.items.forEach(item => {
    if (brandFilter !== "all" && item.vendor !== brandFilter) return;
    const k = item.design;
    if (!countMap[k]) countMap[k] = { count: 0, vendor: item.vendor };
    countMap[k].count++;
  }));
  const sorted = Object.entries(countMap).sort((a, b) => b[1].count - a[1].count);
  const maxCount = sorted[0]?.[1].count || 1;
  const totalChips  = sorted.reduce((s, [,v]) => s + v.count, 0);
  const totalOrders = filtered.filter(o => brandFilter === "all" || o.items.some(i => i.vendor === brandFilter)).length;

  const brandTotals = {};
  for (const b of ["mynails", "TIP DE GEL"]) {
    const chips = filtered.reduce((s, o) => s + o.items.filter(i => i.vendor === b).length, 0);
    const ords  = filtered.filter(o => o.items.some(i => i.vendor === b)).length;
    brandTotals[b] = { chips, orders: ords };
  }

  const monthLabel = m => {
    if (!m || m === "all") return "全期間";
    const [y, mo] = m.split("/");
    return `${y}年${parseInt(mo)}月`;
  };

  if (!allOrders.length) {
    return (
      <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "24px" }}>
        <div style={{ color: "#555", fontSize: "10px", letterSpacing: "0.2em", marginBottom: "32px" }}>ORDER SUMMARY — mynails. / TIP DE GEL</div>
        <div className={`drop-zone${drag ? " drag-over" : ""}`} style={{ width: "100%", maxWidth: "400px" }}
          onClick={() => fileRef.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}
        >
          <div style={{ fontSize: "28px", marginBottom: "12px" }}>📂</div>
          <div style={{ color: "#CCC", fontSize: "13px", marginBottom: "6px" }}>ShopifyのCSVをここにドロップ</div>
          <div style={{ color: "#555", fontSize: "11px" }}>またはタップして選択</div>
          <input ref={fileRef} type="file" accept=".csv" onChange={e => handleFile(e.target.files[0])} />
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: "#F7F5F2" }}>
      <div style={{ background: "#1A1A1A", padding: "20px 24px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "14px" }}>
          <div style={{ color: "#555", fontSize: "10px", letterSpacing: "0.15em" }}>ORDER SUMMARY</div>
          <button onClick={() => { setAllOrders([]); setFileName(null); setBrandFilter("all"); setMonthFilter("all"); }} style={{
            background: "transparent", border: "1px solid #333", color: "#666", padding: "4px 10px", fontSize: "10px", borderRadius: "2px",
          }}>↺ 再読み込み</button>
        </div>

        {months.length > 0 && (
          <div style={{ display: "flex", gap: "6px", marginBottom: "14px", overflowX: "auto", paddingBottom: "2px" }}>
            <button onClick={() => setMonthFilter("all")} style={{
              background: monthFilter === "all" ? "#F7F5F2" : "transparent",
              color: monthFilter === "all" ? "#1A1A1A" : "#555",
              border: "1px solid", borderColor: monthFilter === "all" ? "#F7F5F2" : "#333",
              padding: "4px 12px", fontSize: "10px", borderRadius: "2px", whiteSpace: "nowrap",
            }}>全期間</button>
            {months.map(m => (
              <button key={m} onClick={() => setMonthFilter(m)} style={{
                background: monthFilter === m ? "#F7F5F2" : "transparent",
                color: monthFilter === m ? "#1A1A1A" : "#555",
                border: "1px solid", borderColor: monthFilter === m ? "#F7F5F2" : "#333",
                padding: "4px 12px", fontSize: "10px", borderRadius: "2px", whiteSpace: "nowrap",
              }}>{monthLabel(m)}</button>
            ))}
          </div>
        )}

        <div style={{ display: "flex", gap: "8px" }}>
          {[["all","ALL"], ["mynails","mynails."], ["TIP DE GEL","TIP DE GEL"]].map(([val, label]) => {
            const active = brandFilter === val;
            const bc = val !== "all" ? BRAND_COLORS[val] : null;
            const chips = val === "all" ? totalChips : (brandTotals[val]?.chips || 0);
            const ords  = val === "all" ? totalOrders : (brandTotals[val]?.orders || 0);
            return (
              <button key={val} onClick={() => setBrandFilter(val)} style={{
                flex: 1, background: active ? (bc?.bg || "#F7F5F2") : "transparent",
                border: "1px solid", borderColor: active ? (bc?.accent || "#CCC") : "#333",
                borderBottom: "none", borderRadius: "4px 4px 0 0",
                padding: "10px 12px", textAlign: "left", transition: "all 0.15s",
              }}>
                <div style={{ fontSize: "10px", fontWeight: 600, color: active ? (bc?.accent || "#1A1A1A") : "#555", letterSpacing: "0.05em", marginBottom: "3px" }}>{label}</div>
                <div style={{ display: "flex", gap: "10px", alignItems: "baseline" }}>
                  <span><span style={{ fontSize: "20px", fontWeight: 200, color: active ? "#1A1A1A" : "#666", lineHeight: 1 }}>{chips}</span><span style={{ fontSize: "9px", color: "#888", marginLeft: "2px" }}>点</span></span>
                  <span><span style={{ fontSize: "13px", fontWeight: 200, color: active ? "#444" : "#555" }}>{ords}</span><span style={{ fontSize: "9px", color: "#888", marginLeft: "2px" }}>件</span></span>
                </div>
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ background: "#F0ECE8", padding: "8px 24px", borderBottom: "1px solid #E0DCD8" }}>
        <span style={{ fontSize: "9px", color: "#AAA" }}>📄 {fileName}</span>
      </div>

      <div style={{ padding: "18px 24px" }}>
        {sorted.length === 0 ? (
          <div style={{ textAlign: "center", color: "#AAA", padding: "40px 0", fontSize: "12px" }}>該当なし</div>
        ) : (
          <>
            {sorted.map(([design, info]) => {
              const bc = bcOf(info.vendor);
              return (
                <div key={design} style={{ marginBottom: "12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "4px" }}>
                    <div style={{ width: "7px", height: "7px", borderRadius: "50%", background: getColor(design), flexShrink: 0 }} />
                    <div style={{ flex: 1, fontSize: "12px", color: "#2A2A2A", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {shortName(design)}
                      {design.includes("6月限定") && <span style={{ marginLeft: "5px", fontSize: "9px", color: "#C4A49A", border: "1px solid #C4A49A", padding: "1px 4px", borderRadius: "2px" }}>LIMITED</span>}
                    </div>
                    <span style={{ fontSize: "9px", padding: "1px 5px", borderRadius: "2px", background: bc.bg, color: bc.accent, border: `1px solid ${bc.accent}44`, flexShrink: 0 }}>{bc.label}</span>
                    <div style={{ fontSize: "20px", fontWeight: 200, color: "#1A1A1A", minWidth: "22px", textAlign: "right" }}>{info.count}</div>
                  </div>
                  <div style={{ height: "3px", background: "#E8E4DF", borderRadius: "2px" }}>
                    <div style={{ height: "100%", width: `${(info.count / maxCount) * 100}%`, background: getColor(design), borderRadius: "2px", transition: "width 0.4s" }} />
                  </div>
                </div>
              );
            })}

            <div style={{ borderTop: "1px solid #E0DCD8", marginTop: "20px", paddingTop: "14px" }}>
              <div style={{ fontSize: "10px", color: "#AAA", letterSpacing: "0.15em", marginBottom: "10px" }}>注文一覧</div>
              {filtered.filter(o => brandFilter === "all" || o.items.some(i => i.vendor === brandFilter)).map(order => {
                const items = brandFilter === "all" ? order.items : order.items.filter(i => i.vendor === brandFilter);
                return (
                  <div key={order.id} style={{ display: "flex", gap: "10px", padding: "8px 0", borderBottom: "1px solid #EDE9E4", alignItems: "flex-start" }}>
                    <div style={{ fontSize: "11px", color: "#888", minWidth: "46px", paddingTop: "1px" }}>{order.id}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: "12px", color: "#2A2A2A", fontWeight: 500, marginBottom: "4px" }}>{order.customer}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: "4px" }}>
                        {[...new Map(items.map(i => [i.design, i])).values()].map((item, idx) => (
                          <span key={idx} style={{
                            fontSize: "10px", padding: "2px 7px", borderRadius: "2px",
                            background: getColor(item.design) + "18", border: `1px solid ${getColor(item.design)}44`,
                            color: "#2A2A2A", display: "flex", alignItems: "center", gap: "4px",
                          }}>
                            <span style={{ width: "5px", height: "5px", borderRadius: "50%", background: getColor(item.design), flexShrink: 0 }} />
                            {shortName(item.design)}
                          </span>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
